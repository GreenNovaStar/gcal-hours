<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Hours Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    #signin-btn {
      background: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    #signin-btn:hover { background: #3367d6; }

    .controls {
      display: none;
      margin-top: 24px;
    }

    .controls.visible { display: block; }

    .keyword-input {
      margin-bottom: 16px;
    }

    .keyword-input label {
      display: block;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 4px;
    }

    .keyword-input input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .calendar-picker {
      margin-bottom: 16px;
    }

    .calendar-picker label {
      display: block;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 4px;
    }

    .calendar-picker select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      background: white;
      cursor: pointer;
    }

    .month-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .month-picker button {
      background: #eee;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .month-picker button:hover { background: #ddd; }

    .month-label {
      font-size: 1.1rem;
      font-weight: 600;
      min-width: 160px;
    }

    #calculate-btn {
      background: #34a853;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    #calculate-btn:hover { background: #2d9249; }
    #calculate-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .results {
      display: none;
      margin-top: 32px;
      text-align: left;
    }

    .results.visible { display: block; }

    .total-hours {
      font-size: 2.5rem;
      font-weight: 700;
      color: #34a853;
      text-align: center;
      margin-bottom: 16px;
    }

    .total-label {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }

    .event-list {
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }

    .event-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.9rem;
      gap: 12px;
    }

    .event-item:first-child { padding-top: 0; }
    .event-item:last-child { border-bottom: none; padding-bottom: 0; }

    .event-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .event-title {
      font-weight: 500;
    }

    .raw-times-toggle {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #666;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .toggle input { display: none; }

    .toggle-switch {
      width: 36px;
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-switch {
      background: #4285f4;
    }

    .toggle input:checked + .toggle-switch::after {
      transform: translateX(16px);
    }

    .event-date { color: #666; }
    .event-time { color: #999; font-size: 0.85rem; }
    .event-hours { font-weight: 600; white-space: nowrap; }

    .user-info {
      display: none;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 16px;
    }

    .user-info.visible { display: block; }

    #signout-btn {
      background: none;
      border: none;
      color: #4285f4;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    .loading {
      display: none;
      margin-top: 24px;
      color: #666;
    }

    .loading.visible { display: block; }

    .error {
      display: none;
      margin-top: 16px;
      color: #d93025;
      font-size: 0.9rem;
    }

    .error.visible { display: block; }

    .setup-notice {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 0.85rem;
      text-align: left;
      line-height: 1.5;
    }

    .setup-notice.visible { display: block; }
    .setup-notice code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Work Hours Calculator</h1>
    <p class="subtitle">Calculate your monthly work hours from Google Calendar</p>

    <div class="setup-notice" id="setup-notice">
      <strong>Setup required:</strong> Edit <code>config.js</code> and add your Google Cloud OAuth Client ID.
      See <code>README.md</code> for instructions.
    </div>

    <button id="signin-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>

    <div class="user-info" id="user-info">
      Signed in as <span id="user-name"></span>
      <button id="signout-btn">Sign out</button>
    </div>

    <div class="controls" id="controls">
      <div class="calendar-picker">
        <label for="calendar-select">Calendar</label>
        <select id="calendar-select"></select>
      </div>
      <div class="keyword-input">
        <label for="work-keyword">Event keyword</label>
        <input type="text" id="work-keyword" placeholder="e.g. Work">
      </div>
      <div class="month-picker">
        <button id="prev-month">&larr;</button>
        <span class="month-label" id="month-label"></span>
        <button id="next-month">&rarr;</button>
      </div>
      <button id="calculate-btn">Calculate Hours</button>
    </div>

    <div class="loading" id="loading">Fetching events...</div>
    <div class="error" id="error"></div>

    <div class="results" id="results">
      <div class="total-hours" id="total-hours"></div>
      <div class="total-label" id="total-label"></div>
      <div class="event-list" id="event-list"></div>
      <div class="raw-times-toggle">
        <label class="toggle">
          <input type="checkbox" id="show-raw-times" checked>
          <span class="toggle-switch"></span>
          Show original times
        </label>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
